name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/caveman/SKILL.md
      - skills/caveman-ru/SKILL.md
      - skills/caveman-ru/abbreviations.md
      - rules/caveman-activate.md
      - rules/caveman-ru-activate.md
      - caveman-compress/SKILL.md
      - caveman-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/caveman/SKILL.md caveman/SKILL.md
          cp skills/caveman/SKILL.md plugins/caveman/skills/caveman/SKILL.md
          cp skills/caveman/SKILL.md .cursor/skills/caveman/SKILL.md
          mkdir -p .windsurf/skills/caveman
          cp skills/caveman/SKILL.md .windsurf/skills/caveman/SKILL.md

      - name: Sync caveman-ru SKILL.md + abbreviations
        run: |
          # Plugin target
          mkdir -p plugins/caveman/skills/caveman-ru
          cp skills/caveman-ru/SKILL.md plugins/caveman/skills/caveman-ru/SKILL.md
          cp skills/caveman-ru/abbreviations.md plugins/caveman/skills/caveman-ru/abbreviations.md

          # Cursor skill target
          mkdir -p .cursor/skills/caveman-ru
          cp skills/caveman-ru/SKILL.md .cursor/skills/caveman-ru/SKILL.md
          cp skills/caveman-ru/abbreviations.md .cursor/skills/caveman-ru/abbreviations.md

          # Windsurf skill target
          mkdir -p .windsurf/skills/caveman-ru
          cp skills/caveman-ru/SKILL.md .windsurf/skills/caveman-ru/SKILL.md
          cp skills/caveman-ru/abbreviations.md .windsurf/skills/caveman-ru/abbreviations.md

      - name: Sync compress skill to plugin
        run: |
          # Copy SKILL.md and patch name + process instructions for plugin context
          cp caveman-compress/SKILL.md plugins/caveman/skills/compress/SKILL.md
          sed -i 's/^name: caveman-compress$/name: compress/' plugins/caveman/skills/compress/SKILL.md
          sed -i "s|The compression scripts live in \`caveman-compress/scripts/\` (adjacent to this SKILL.md). If the path is not immediately available, search for \`caveman-compress/scripts/__main__.py\`.|This SKILL.md lives alongside \`scripts/\` in the same directory. Find that directory.|" plugins/caveman/skills/compress/SKILL.md
          sed -i 's|cd caveman-compress && python3|cd <directory_containing_this_SKILL.md> \&\& python3|' plugins/caveman/skills/compress/SKILL.md
          # Copy scripts verbatim
          rm -rf plugins/caveman/skills/compress/scripts
          cp -r caveman-compress/scripts plugins/caveman/skills/compress/scripts
          rm -rf plugins/caveman/skills/compress/scripts/__pycache__

      - name: Rebuild caveman.skill ZIP
        run: cd skills && zip -r ../caveman.skill caveman/

      - name: Rebuild caveman-ru.skill ZIP
        run: cd skills && zip -r ../caveman-ru.skill caveman-ru/

      - name: Sync auto-activation rules
        run: |
          BODY="rules/caveman-activate.md"

          # Cline + Copilot — no frontmatter, direct copy
          mkdir -p .clinerules .github
          cp "$BODY" .clinerules/caveman.md
          cp "$BODY" .github/copilot-instructions.md

          # Cursor — needs alwaysApply frontmatter
          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "Caveman mode — terse communication, ~75% fewer tokens, full technical accuracy"' 'alwaysApply: true' '---' '' > .cursor/rules/caveman.mdc
          cat "$BODY" >> .cursor/rules/caveman.mdc

          # Windsurf — needs always_on frontmatter
          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: always_on' '---' '' > .windsurf/rules/caveman.md
          cat "$BODY" >> .windsurf/rules/caveman.md

      - name: Sync Russian auto-activation rules
        run: |
          RU_BODY="rules/caveman-ru-activate.md"

          # Cline — direct copy. `.clinerules/` is auto-loaded, English and
          # Russian rules coexist; the Russian SKILL header explains when to
          # activate (user writes in Russian / asks for Russian mode).
          mkdir -p .clinerules
          cp "$RU_BODY" .clinerules/caveman-ru.md

          # Cursor — opt-in (alwaysApply: false + agent-requested description).
          # Users who want Russian always-on can flip alwaysApply themselves.
          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "Russian Caveman — compressed Russian technical answers. Activate when user writes in Russian or asks for Russian mode (/caveman ru, /caveman-ru)."' 'alwaysApply: false' '---' '' > .cursor/rules/caveman-ru.mdc
          cat "$RU_BODY" >> .cursor/rules/caveman-ru.mdc

          # Windsurf — opt-in via model_decision trigger.
          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: model_decision' 'description: "Russian Caveman — activate when user writes in Russian or asks for Russian mode."' '---' '' > .windsurf/rules/caveman-ru.md
          cat "$RU_BODY" >> .windsurf/rules/caveman-ru.md

          # NOTE: we deliberately do NOT append Russian rules to
          # .github/copilot-instructions.md or AGENTS.md — those are single,
          # repo-wide instruction files and the English version is the
          # default. Russian Copilot users can pull in skills/caveman-ru/
          # manually or set `caveman.lang: ru` in their local settings.

      - name: Commit and push if changed
        run: |
          git add \
            caveman/SKILL.md \
            plugins/caveman/skills/compress/ \
            plugins/caveman/skills/caveman/SKILL.md \
            plugins/caveman/skills/caveman-ru/ \
            .cursor/skills/caveman/SKILL.md \
            .cursor/skills/caveman-ru/ \
            .windsurf/skills/caveman/SKILL.md \
            .windsurf/skills/caveman-ru/ \
            caveman.skill \
            caveman-ru.skill \
            .clinerules/caveman.md \
            .clinerules/caveman-ru.md \
            .github/copilot-instructions.md \
            .cursor/rules/caveman.mdc \
            .cursor/rules/caveman-ru.mdc \
            .windsurf/rules/caveman.md \
            .windsurf/rules/caveman-ru.md
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies and auto-activation rules [skip ci]"
          git push
